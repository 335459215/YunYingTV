name: Android CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'screenshot*.png'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with APK'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # Job 1: 代码质量检查
  quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

  # Job 2: 构建Android Release APK
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: quality-check
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: app_version
        run: echo "VERSION=$(node -p "require('./app.json').expo.version")" >> $GITHUB_OUTPUT

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/app/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Android Release APK
        run: npm run build

      - name: Verify APK exists
        run: |
          if [ ! -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "::error::APK build failed - file not found"
            exit 1
          fi
          ls -lh android/app/build/outputs/apk/release/app-release.apk

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk \
             release/YunYingTV-v${{ steps.app_version.outputs.VERSION }}-${{ github.sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: release/*.apk
          retention-days: 14
          if-no-files-found: error

  # Job 3: 可选 - 创建 GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-apk
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: release/

      - name: Auto-increment version from existing releases
        id: app_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_VERSION=$(node -p "require('./app.json').expo.version")
          echo "Base version from app.json: ${BASE_VERSION}"

          LATEST_RELEASE=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=1" | \
            node -p "try { const r = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); r[0]?.tag_name?.replace('v','') || '${BASE_VERSION}' } catch(e) { '${BASE_VERSION}' }")

          echo "Latest release version: ${LATEST_RELEASE}"

          NEW_VERSION=$(node -e "
            const base = '${BASE_VERSION}';
            const latest = '${LATEST_RELEASE}';
            let ver = (latest > base) ? latest : base;
            const parts = ver.split('.');
            parts[parts.length - 1] = (parseFloat(parts[parts.length - 1]) + 0.01).toFixed(2).replace(/\.?0+$/, '');
            console.log(parts.join('.'));
          ")

          echo "New release version: ${NEW_VERSION}"
          echo "VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "## 🚀 YunYingTV v${{ steps.app_version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### ✨ 新功能" >> $GITHUB_OUTPUT
          echo "- 多主题系统：支持深色、浅色、透明三种模式" >> $GITHUB_OUTPUT
          echo "- 历史记录页面：观看历史、分类筛选、进度显示" >> $GITHUB_OUTPUT
          echo "- 收藏页优化：分类筛选 + 操作按钮行" >> $GITHUB_OUTPUT
          echo "- 底部导航精简：首页|直播|设置" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 🔧 优化改进" >> $GITHUB_OUTPUT
          echo "- 全局组件适配动态主题系统 (dark/light/glass)" >> $GITHUB_OUTPUT
          echo "- 修复所有硬编码颜色值问题" >> $GITHUB_OUTPUT
          echo "- StatusBar/SystemUI 背景色动态响应" >> $GITHUB_OUTPUT
          echo "- 首页 header 新增收藏+历史记录快捷入口" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📱 构建信息" >> $GITHUB_OUTPUT
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_OUTPUT
          echo "- Triggered by: ${{ github.actor }}" >> $GITHUB_OUTPUT
          echo "- Build time: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.app_version.outputs.VERSION }}
          name: Release v${{ steps.app_version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
          files: release/*.apk
          fail_on_unmatched_files: false
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "✅ Release created successfully!"
          echo "📦 Version: v${{ steps.app_version.outputs.VERSION }}"
          echo "🔗 URL: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.app_version.outputs.VERSION }}"
