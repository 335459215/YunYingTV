name: Build Android APK with EAS

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK with EAS
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Setup EAS
        run: |
          eas build:configure --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get version from app.json
        id: version
        run: echo "VERSION=$(node -p \"require('./app.json').expo.version\")" >> $GITHUB_OUTPUT

      - name: Build APK with EAS
        run: |
          eas build -p android --profile preview --non-interactive --output YunYingTV-v${{ steps.version.outputs.VERSION }}.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: YunYingTV-v*.apk
          retention-days: 30

      - name: Create Release
        if: always()
        uses: softprops/action-gh-release@v1
        with:
          files: YunYingTV-v*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
