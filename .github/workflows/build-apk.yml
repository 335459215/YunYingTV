name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies with yarn..."
          rm -f package-lock.json
          yarn install --frozen-lockfile || yarn install --ignore-engines

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Prebuild (Expo)
        run: |
          echo "🔧 Starting prebuild..."
          export EXPO_USE_METRO_WORKSPACE_ROOT=1
          yarn expo prebuild --clean
        env:
          EXPO_NO_GIT_CLEAN: 1

      - name: Copy config files
        run: |
          echo "📋 Copying configuration files..."
          node scripts/copy-config.js

      - name: Make gradlew executable
        run: |
          echo "🔨 Making gradlew executable..."
          chmod +x android/gradlew

      - name: Build APK
        run: |
          echo "🏗️  Building APK..."
          cd android
          ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Prepare APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/YunYingTV-v${{ steps.version.outputs.VERSION }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YunYingTV-v${{ steps.version.outputs.VERSION }}
          path: release/*.apk
          retention-days: 30

      - name: Create Release
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
