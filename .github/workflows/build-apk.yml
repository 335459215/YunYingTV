name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          rm -f package-lock.json
          yarn install --ignore-engines

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Prebuild (Expo)
        run: |
          echo "🔧 Running expo prebuild..."
          npx expo prebuild --clean --no-install
        env:
          EXPO_NO_GIT_CLEAN: 1
          EXPO_USE_METRO_WORKSPACE_ROOT: 1

      - name: Copy config files
        run: |
          echo "📋 Copying configuration files..."
          node scripts/copy-config.js

      - name: Make gradlew executable
        run: |
          echo "🔨 Making gradlew executable..."
          chmod +x android/gradlew

      - name: Build APK
        run: |
          echo "🏗️  Building APK..."
          cd android
          ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Verify APK
        run: |
          echo "📦 Verifying APK..."
          ls -lh android/app/build/outputs/apk/release/ || echo "No APK found"

      - name: Prepare APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/YunYingTV-v${{ steps.version.outputs.VERSION }}.apk
          echo "✅ APK ready: release/YunYingTV-v${{ steps.version.outputs.VERSION }}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YunYingTV-v${{ steps.version.outputs.VERSION }}
          path: release/*.apk
          retention-days: 30

      - name: Create Release
        if: github.event.inputs.create_release == 'true'
        timeout-minutes: 10
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ## YunYingTV v${{ steps.version.outputs.VERSION }}
            
            Automated build from GitHub Actions
            
            ### Features
            - Build APK with GitHub Actions
            - Optimized for Android TV
            - Support for live streaming and VOD
          draft: false
          prerelease: false
          files: release/*.apk
          fail_on_unmatched_files: false
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETRY_COUNT: 3
          RETRY_DELAY: 5000
