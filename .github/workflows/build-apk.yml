name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  packages: write
  actions: write

env:
  NODE_VERSION: '24'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: build_version
        run: echo "VERSION=$(node -p \"require('./app.json').expo.version\")" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: |
          echo "Making gradlew executable..."
          chmod +x android/gradlew

      - name: Build APK
        run: npm run build
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Verify APK
        run: |
          echo "Verifying APK..."
          if [ ! -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "::error::APK build failed"
            exit 1
          fi
          ls -lh android/app/build/outputs/apk/release/

      - name: Prepare APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/YunYingTV-v${{ steps.build_version.outputs.VERSION }}.apk
          echo "APK ready: release/YunYingTV-v${{ steps.build_version.outputs.VERSION }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YunYingTV-v${{ steps.build_version.outputs.VERSION }}
          path: release/*.apk
          retention-days: 30

      - name: Create Release
        if: github.event.inputs.create_release == 'true'
        timeout-minutes: 10
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.build_version.outputs.VERSION }}"
          TAG="v${VERSION}"
          
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "Release ${TAG}" \
            --notes "## YunYingTV v${VERSION}

          Automated build from GitHub Actions

          ### Changes
          - Built directly from committed android project
          - Node.js ${{ env.NODE_VERSION }} + JDK 17" \
            release/*.apk || {
            echo "::warning::Release may already exist, updating..."
            gh release upload "${TAG}" --clobber release/*.apk || true
          }
