name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: build_version
        run: echo "VERSION=$(node -p \"require('./app.json').expo.version\")" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: |
          echo "🔨 Making gradlew executable..."
          chmod +x android/gradlew

      - name: Build APK
        run: npm run build
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Verify APK
        run: |
          echo "📦 Verifying APK..."
          ls -lh android/app/build/outputs/apk/release/ || echo "No APK found"

      - name: Prepare APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/YunYingTV-v${{ steps.build_version.outputs.VERSION }}.apk
          echo "✅ APK ready: release/YunYingTV-v${{ steps.build_version.outputs.VERSION }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YunYingTV-v${{ steps.build_version.outputs.VERSION }}
          path: release/*.apk
          retention-days: 30

      - name: Create Release
        if: github.event.inputs.create_release == 'true'
        timeout-minutes: 10
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.build_version.outputs.VERSION }}
          name: Release v${{ steps.build_version.outputs.VERSION }}
          body: |
            ## YunYingTV v${{ steps.build_version.outputs.VERSION }}
            
            Automated build from GitHub Actions
            
            ### Features
            - Build APK with GitHub Actions
            - Fixed Android native asset sync
            - Version baseline reset to 0.01
            
            ### Changes
            - Built directly from committed android project
          draft: false
          prerelease: false
          files: release/*.apk
          fail_on_unmatched_files: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
